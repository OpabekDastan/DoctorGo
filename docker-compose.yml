services:
  db:
    image: postgres:15-alpine
    container_name: doctorgo-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: das123opa
      POSTGRES_DB: doctorgo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doctorgo"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: doctorgo-app
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: das123opa
      DB_NAME: doctorgo
      DB_SSLMODE: disable
      APP_PORT: 8080
      JWT_SECRET: super-secret-key
      ACCESS_TOKEN_TTL_MINUTES: 120
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
